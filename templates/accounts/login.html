<!-- templates/accounts/login.html -->
{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center relative overflow-hidden bg-surface">
    <!-- Abstract Background Blob (Modern touch) -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-500/20 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/20 rounded-full blur-[100px]"></div>

    <!-- Login Card -->
    <div class="z-10 w-full max-w-md p-8 glass rounded-[2rem] shadow-2xl shadow-gray-200/50" data-aos="fade-up">
        
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-zinc-900 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i data-lucide="brain-circuit" class="w-6 h-6"></i>
            </div>
            <h2 class="text-2xl font-bold tracking-tight text-zinc-900">Welcome to SDPS</h2>
            <p class="text-sm text-zinc-500 mt-1">Predict. Intervene. Retain.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Username</label>
                <input type="text" name="username" class="w-full px-4 py-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all duration-300" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Password</label>
                <input type="password" name="password" class="w-full px-4 py-3 bg-white border border-zinc-200 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all duration-300" required>
            </div>
            <button type="submit" class="w-full mt-6 py-3.5 bg-zinc-900 hover:bg-zinc-800 text-white font-medium rounded-xl transition-all duration-300 hover:shadow-lg hover:shadow-zinc-900/20 hover:-translate-y-0.5 flex justify-center items-center gap-2">
                Sign In <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
