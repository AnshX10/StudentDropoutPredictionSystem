<!-- templates/academics/add_record.html -->
{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen bg-surface py-12 px-6">
    <div class="max-w-2xl mx-auto">
        <a href="{% url 'faculty_dashboard' %}" class="inline-flex items-center gap-2 text-zinc-500 hover:text-zinc-900 transition-colors mb-8">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
        </a>

        <div class="bg-white rounded-[2rem] p-10 border border-zinc-100 shadow-xl shadow-zinc-200/50" data-aos="zoom-in">
            <h2 class="text-2xl font-bold text-zinc-900 mb-2">Academic Entry</h2>
            <p class="text-zinc-500 mb-8 font-medium">Updating records for: {{ student.user.get_full_name }}</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                {% for field in form %}
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-zinc-400 uppercase tracking-widest">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <p class="text-[11px] text-zinc-400 italic">{{ field.help_text }}</p>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="w-full py-4 bg-zinc-900 text-white rounded-2xl font-bold hover:bg-zinc-800 transition-all hover:shadow-lg">
                    Save Academic Record
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
